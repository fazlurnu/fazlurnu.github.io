name: Update publications from ORCID

on:
  schedule:
    - cron: "17 5 * * 1"   # Mondays 05:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Fetch publications
        env:
          ORCID_ID: "0009-0006-8410-7156"
        run: python scripts/fetch_publications.py

      - name: Commit if changed
        run: |
          git add _data/publications.auto.yml
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh publications.auto.yml from ORCID"
          git push
