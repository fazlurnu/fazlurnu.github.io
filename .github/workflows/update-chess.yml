name: Update Chess Rating

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch chess.com stats
        run: |
          set -euo pipefail
          curl -sS \
            -H "User-Agent: fazlurnu.github.io weekly rating updater (contact: github.com/fazlurnu)" \
            https://api.chess.com/pub/player/toko_material/stats > stats.json

      - name: Write _data/chess.yml
        run: |
          set -euo pipefail
          pick () { jq -r "(.${1} // empty) | if . == null then \"null\" else tostring end" stats.json; }

          R_CUR=$(jq -r '.chess_rapid.last.rating  // "null"' stats.json)
          R_BST=$(jq -r '.chess_rapid.best.rating  // "null"' stats.json)
          B_CUR=$(jq -r '.chess_blitz.last.rating  // "null"' stats.json)
          B_BST=$(jq -r '.chess_blitz.best.rating  // "null"' stats.json)
          U_CUR=$(jq -r '.chess_bullet.last.rating // "null"' stats.json)
          U_BST=$(jq -r '.chess_bullet.best.rating // "null"' stats.json)
          TODAY=$(date -u +%Y-%m-%d)

          mkdir -p _data
          cat > _data/chess.yml <<EOF
          # Auto-updated weekly by .github/workflows/update-chess.yml
          rapid:
            current: ${R_CUR}
            best: ${R_BST}
          blitz:
            current: ${B_CUR}
            best: ${B_BST}
          bullet:
            current: ${U_CUR}
            best: ${U_BST}
          updated: "${TODAY}"
          EOF

          rm -f stats.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/chess.yml
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore(chess): weekly rating update"
          git push
