---
layout: default
---
<main class="wrap">
  <article>
    <header class="post-header">
      <div class="meta">
        {{ page.date | date: "%Y-%m-%d" }}
        {% if page.tags and page.tags.size > 0 %} · {{ page.tags | join: ", " }}{% endif %}
      </div>
      <h1>{{ page.title }}</h1>
    </header>

    <div class="post-body">
      {{ content }}
    </div>

    <a href="{{ '/blog/' | relative_url }}" class="back-link">← back to blog</a>
  </article>

  <footer class="footer">
    <p>© <span class="mono">Muhammad Fazlur Rahman</span> · No template, just vibe coding</p>
  </footer>
</main>
